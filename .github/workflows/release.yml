name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for manual dispatch (e.g. v0.1.0-test)'
        required: true
        default: 'v0.0.0-manual'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build DeskTrek.app (Release, ad-hoc signed)
        run: |
          xcodebuild \
            -project DeskTrek.xcodeproj \
            -scheme DeskTrek \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build
        shell: bash

      - name: Package app into zip
        run: |
          APP_PATH="build/Build/Products/Release/DeskTrek.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Build output not found at $APP_PATH"; exit 1
          fi
          ARTIFACT="DeskTrek-${VERSION}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ARTIFACT"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"
          ls -lh "$ARTIFACT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskTrek-${{ env.VERSION }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
          body: |
            ## Install

            1. Download `${{ env.ARTIFACT }}` below.
            2. Unzip it and drag **DeskTrek.app** to your Applications folder.
            3. **First launch:** right-click the app and choose **Open** (Gatekeeper will warn because the build is unsigned). After confirming once, it launches normally from then on.

            If macOS says the app is "damaged and can't be opened," run this once in Terminal:
            ```
            xattr -dr com.apple.quarantine /Applications/DeskTrek.app
            ```
